name: Deploy houmonkango (manual trigger only)

# ============================================================
# 🌿 訪問看護ナビ（関西版） デプロイワークフロー
#
# 重要：このワークフローは push しても自動実行されません。
# GitHubの「Actions」タブから「Run workflow」ボタンを押したときだけ
# 実行される、完全手動トリガー方式です（ご要望の「完全手動制」に対応）。
# ============================================================
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --- 1. リポジトリの取得 ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 2. Python環境のセットアップ ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pandas

      # --- 3. build.pyを実行してdist/を生成 ---
      - name: Run build.py
        run: python3 build.py

      # --- 4. Node.js環境のセットアップ（wrangler実行のため） ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # --- 5. Cloudflare Workersへデプロイ ---
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
