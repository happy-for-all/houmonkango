name: Cleanup old archive files (monthly, automatic)

# ============================================================
# 🌿 archive/ フォルダの古いバックアップを月1回自動削除する
# ============================================================
on:
  schedule:
    # 修正済み（2026-07-15）：GitHub Actionsのcronは常にUTC基準のため、
    # 以前の設定（0 18 1 * *）は実際には「毎月1日」ではなく
    # 「毎月2日 深夜(JST 3:00頃)」に実行されていた（UTC18:00+9h=翌日3:00）。
    # 「毎月1日」ちょうどに実行されるよう、JST 0:00（UTC前日15:00）に修正する。
    - cron: "0 15 1 * *"   # 毎月1日 深夜(JST 0:00)に自動実行
  workflow_dispatch:        # 手動での即時実行もできるようにしておく

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run cleanup script
        run: python3 cleanup_old_archives.py

      - name: Commit changes if any files were deleted
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: archive/内の古いバックアップを自動削除"
          git push
